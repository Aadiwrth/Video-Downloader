<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 14px;
      background-color: #1E1E2E;
      color: #CDD6F4;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 12px;
      color: #89B4FA;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .video-title {
      font-size: 12px;
      font-weight: 500;
      background-color: #313244;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
      word-wrap: break-word;
      max-height: 50px;
      overflow-y: auto;
      color: #F5E0DC;
      border: 1px solid #45475A;
    }
    .form-group {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #A6ADC8;
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      background-color: #313244;
      color: #CDD6F4;
      border: 1px solid #45475A;
      padding: 8px;
      font-size: 12px;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
    }
    select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    button {
      width: 100%;
      background-color: #89B4FA;
      color: #11111B;
      border: none;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    button:hover:not(:disabled) {
      background-color: #B4BEFE;
    }
    button:active:not(:disabled) {
      transform: scale(0.98);
    }
    button:disabled {
      background-color: #45475A;
      color: #585B70;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 10px;
      text-align: center;
      color: #A6ADC8;
      border-top: 1px solid #313244;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <h3>📥 Video Downloader</h3>
  
  <label>Detected Video Title:</label>
  <div class="video-title" id="titleContainer">Connecting to downloader app...</div>
  
  <div class="form-group">
    <label for="formatSelect">Select Quality Resolution:</label>
    <select id="formatSelect" disabled>
      <option>Loading formats...</option>
    </select>
  </div>
  
  <div class="form-group" id="warningContainer" style="display: none; background-color: #eba0ac; color: #11111b; padding: 8px 10px; border-radius: 6px; font-size: 11px; margin-bottom: 12px; font-weight: bold; border: 1px solid #f38ba8; text-align: left; line-height: 1.4;">
    ⚠️ Note: Resolutions above 1080p are not compatible with all TVs when TV Compatibility is enabled.
  </div>
  
  <button id="sendBtn" disabled>Send to Downloader</button>
  <div class="status" id="statusText">Connection status checking...</div>
  
  <script src="popup.js"></script>
</body>
</html>
